<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BotNLP</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background:#0f1117; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; }
  header { padding:16px 24px; background:#1a1d27; border-bottom:1px solid #2a2d3e; display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size:1.2rem; color:#7c83fd; letter-spacing:1px; }
  #reset-btn { background:transparent; border:1px solid #444; color:#aaa; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:0.8rem; }
  #reset-btn:hover { border-color:#7c83fd; color:#7c83fd; }
  #chat-window { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:12px; }
  .bubble { max-width:70%; padding:12px 16px; border-radius:16px; line-height:1.5; font-size:0.92rem; }
  .user-wrap { display:flex; justify-content:flex-end; }
  .bot-wrap  { display:flex; justify-content:flex-start; }
  .user { background:#7c83fd; color:#fff; border-bottom-right-radius:4px; }
  .bot  { background:#1e2130; color:#dde; border-bottom-left-radius:4px; }
  .meta { font-size:0.72rem; color:#666; margin-top:4px; }
  #input-area { padding:16px 24px; background:#1a1d27; border-top:1px solid #2a2d3e; display:flex; gap:10px; }
  #msg-input { flex:1; background:#0f1117; border:1px solid #2a2d3e; border-radius:10px; padding:12px 16px; color:#e0e0e0; font-size:0.95rem; outline:none; }
  #msg-input:focus { border-color:#7c83fd; }
  #send-btn { background:#7c83fd; color:#fff; border:none; border-radius:10px; padding:12px 20px; cursor:pointer; font-size:1rem; }
  #send-btn:hover { background:#9198ff; }
  .typing { display:flex; gap:5px; align-items:center; padding:8px 14px; }
  .dot { width:7px; height:7px; background:#7c83fd; border-radius:50%; animation:bounce .8s infinite; }
  .dot:nth-child(2){ animation-delay:.15s; } .dot:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
</style>
</head>
<body>
<header>
  <h1>⚡ BotNLP</h1>
  <button id="reset-btn" onclick="resetChat()">Clear Chat</button>
</header>
<div id="chat-window"></div>
<div id="input-area">
  <input id="msg-input" type="text" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendMsg()">
  <button id="send-btn" onclick="sendMsg()">➤</button>
</div>
<script>
  const win = document.getElementById('chat-window');

  function addBubble(text, role, meta='') {
    const wrap = document.createElement('div');
    wrap.className = role === 'user' ? 'user-wrap' : 'bot-wrap';
    wrap.innerHTML = `<div>
      <div class="bubble ${role}">${text}</div>
      ${meta ? `<div class="meta">${meta}</div>` : ''}
    </div>`;
    win.appendChild(wrap);
    win.scrollTop = win.scrollHeight;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.id = 'typing'; el.className = 'bot-wrap';
    el.innerHTML = `<div class="bubble bot typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    win.appendChild(el); win.scrollTop = win.scrollHeight;
  }

  async function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addBubble(text, 'user');
    showTyping();
    const res = await fetch('/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: text})
    });
    document.getElementById('typing')?.remove();
    const data = await res.json();
    const meta = `intent: ${data.intent} · confidence: ${data.confidence}` +
      (Object.keys(data.entities||{}).length ? ` · entities: ${JSON.stringify(data.entities)}` : '');
    addBubble(data.response, 'bot', meta);
  }

  async function resetChat() {
    await fetch('/reset', {method:'POST'});
    win.innerHTML = '';
    addBubble('Chat cleared. Start fresh! 👋', 'bot');
  }

  addBubble('Hello! I\'m BotNLP. Ask me anything!', 'bot');
</script>
</body>
</html>
